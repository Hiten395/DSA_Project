<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Visualizer</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    margin: 0;
    padding: 0;
}

h1 {
    margin: 20px 0;
}

.container {
    width: 600px;
    margin: auto;
    background: #1e293b;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

.section {
    margin-bottom: 20px;
}

input, select, button {
    padding: 10px;
    margin: 5px;
    border-radius: 6px;
    border: none;
    font-size: 14px;
}

input, select {
    width: 120px;
}

button {
    background: #38bdf8;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}

/* Output box */
.output {
    margin-top: 15px;
    padding: 12px;
    background: #020617;
    border-radius: 6px;
    min-height: 40px;
}

/* Visualization area */
.visual {
    margin-top: 25px;
    min-height: 100px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 10px;
    flex-wrap: wrap;
}

/* Individual nodes */
.box {
    background: #22c55e;
    padding: 15px;
    border-radius: 6px;
    min-width: 45px;
    font-weight: bold;
    transition: 0.3s;
}

.box:hover {
    transform: scale(1.1);
}

/* Stack style */
.stack {
    flex-direction: column-reverse;
    align-items: center;
}

/* Queue style */
.queue {
    flex-direction: row;
}

/* Linked list style */
.linked {
    flex-direction: row;
}

.linked .box::after {
    content: "→";
    margin-left: 10px;
    color: #fff;
}

.linked .box:last-child::after {
    content: "";
}
</style>

</head>

<body>

<h1>DSA Visualizer</h1>

<div class="container">

    <!-- Create DS -->
    <div class="section">
        <h3>Create Data Structure</h3>
        <select id="ds">
            <option value="1">Stack</option>
            <option value="2">Queue</option>
            <option value="3">Linked List</option>
        </select>

        <input type="number" id="size" placeholder="Size">

        <button onclick="createDS()">Create</button>
    </div>

    <!-- Operations -->
    <div class="section">
        <h3>Operations</h3>
        <input type="number" id="value" placeholder="Value">

        <br>

        <button onclick="handlePush()">Push</button>
        <button onclick="handlePop()">Pop</button>
        <button onclick="handlePeek()">Peek</button>

        <br>

        <button onclick="handleDisplay()">Display</button>
        <button onclick="handleEmpty()">Is Empty</button>
        <button onclick="handleFull()">Is Full</button>
    </div>

    <!-- Output -->
    <div class="section">
        <h3>Output</h3>
        <div class="output" id="output">
            Your results will appear here...
        </div>
    </div>

    <!-- Visualization -->
    <div class="section">
        <h3>Visualization</h3>
        <!-- Change class dynamically: stack / queue / linked -->
        <div class="visual stack" id="visual">
            <!-- Example boxes (for design preview only) -->
            <!-- Remove later when JS renders real data -->
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
        </div>
    </div>

</div>

<!-- Your JS file -->
<script src="index.js"></script>

</body>
</html>
